replicaSet:
  enabled: true
  name: rs0
  pdb:
    enabled: true
    minAvailable: 1

persistence:
  enabled: true
  storageClass: "${storage_class}"
  size: 50Gi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

auth:
  enabled: false
  userAdminRoles:
    - dbOwner

metrics:
  enabled: true

arbiter:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi